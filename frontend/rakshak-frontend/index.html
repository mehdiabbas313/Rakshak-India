<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <meta
      name="description"
      content="Rakshak India - AI-powered emergency response and public safety platform."
    />

    <title>Rakshak India</title>

    <script>
      (function () {
        try {
          const savedTheme =
            localStorage.getItem("rakshak-theme") || "dark";

          document.documentElement.classList.toggle(
            "dark",
            savedTheme === "dark"
          );

          document.documentElement.style.colorScheme = savedTheme;
        } catch (error) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
